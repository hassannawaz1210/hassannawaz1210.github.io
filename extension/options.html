<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { font-family: system-ui, sans-serif; max-width: 480px; padding: 20px; }
  label { display: block; font-size: 13px; margin: 10px 0 3px; font-weight: 600; }
  input { width: 100%; box-sizing: border-box; padding: 7px; font-size: 13px; }
  button { margin-top: 14px; padding: 8px 16px; background: #0000CD; color: #fff; border: 0; cursor: pointer; }
  #status { font-size: 12px; color: #080; margin-left: 10px; }
  .hint { font-size: 11px; color: #666; margin-top: 2px; }
</style>
</head>
<body>
  <h3>📚 Reading List — settings</h3>
  <label>GitHub token</label>
  <input id="token" type="password" placeholder="github_pat_...">
  <div class="hint">Fine-grained PAT with Contents: Read & Write on the one repo. Stored in browser sync storage.</div>
  <label>Owner</label><input id="owner" placeholder="hassannawaz1210">
  <label>Repo</label><input id="repo" placeholder="hassannawaz1210.github.io">
  <label>File path</label><input id="path" placeholder="links.json">
  <label>Branch</label><input id="branch" placeholder="main">
  <div><button id="save">Save</button><span id="status"></span></div>
  <script src="options.js"></script>
</body>
</html>
