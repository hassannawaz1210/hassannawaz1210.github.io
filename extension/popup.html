<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { font-family: system-ui, sans-serif; width: 320px; padding: 12px; margin: 0; }
  h3 { margin: 0 0 8px; font-size: 14px; }
  input, textarea, button { width: 100%; box-sizing: border-box; font-size: 13px; padding: 6px; margin-bottom: 8px; }
  textarea { resize: vertical; height: 48px; }
  button { cursor: pointer; background: #0000CD; color: #fff; border: 0; padding: 8px; font-weight: 600; }
  button:disabled { opacity: .5; cursor: default; }
  #status { font-size: 12px; min-height: 16px; }
  .err { color: #c00; } .ok { color: #080; }
  a { font-size: 12px; }
</style>
</head>
<body>
  <h3>📚 Add to reading list</h3>
  <input id="title" placeholder="Title">
  <input id="url" placeholder="URL">
  <textarea id="note" placeholder="Note (optional)"></textarea>
  <button id="save">Save</button>
  <div id="status"></div>
  <a href="#" id="manage">Manage list</a> · <a href="#" id="opts">Settings</a>
  <script src="github.js"></script>
  <script src="popup.js"></script>
</body>
</html>
